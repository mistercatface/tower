<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="UI/Shell/shell.css">
</head>

<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>

        <!-- Per-game chrome injected by uiPort.mount() -->
        <div id="ui-root"></div>

        <!-- Engine overlays (shared by all games) -->
        <div id="radioDialog" class="radio-dialog" style="display: none;">
            <button type="button" class="radio-dialog-screen" id="radioDialogAdvanceBtn">
                <div id="radioPortraitRow" class="radio-dialog-portraits"></div>
                <div class="radio-dialog-text-panel">
                    <div id="radioSpeakerName" class="radio-dialog-speaker"></div>
                    <div id="radioLineText" class="radio-dialog-line"></div>
                </div>
                <div class="radio-dialog-hint">Tap to continue</div>
            </button>
        </div>

        <div id="settingsModal" class="ui-overlay ui-overlay--settings">
            <h2 class="settings-title">Settings</h2>
            <button id="hardResetBtn" class="settings-btn settings-btn--danger" type="button">Reset Game</button>
            <button id="closeSettingsBtn" class="settings-btn settings-btn--neutral" type="button">Close</button>
        </div>

        <div id="gameOverUI" class="ui-overlay ui-overlay--run-result">
            <h1 id="gameOverTitle">GAME OVER</h1>
            <button id="restartBtn" type="button">NEW RUN</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
