<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Asset Pipeline Troubleshooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f13;
            --panel-bg: rgba(22, 26, 37, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-color: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.5);
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Glassmorphic Panel */
        aside {
            width: 380px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-color);
            margin-top: 20px;
            margin-bottom: 12px;
            font-weight: 600;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Form Controls */
        .control-group {
            margin-bottom: 16px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-color);
        }

        label span.val {
            font-family: var(--font-mono);
            color: var(--accent-color);
            font-size: 12px;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 3px;
            outline: none;
            margin: 8px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Checkbox & Switch button style */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            cursor: pointer;
        }

        .switch-container span {
            font-size: 13px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.8);
            transition: .4s;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-muted);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: rgba(0, 229, 255, 0.2);
            border-color: var(--accent-color);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
            background-color: var(--accent-color);
            box-shadow: 0 0 6px var(--accent-glow);
        }

        /* Live Math & Matrix Output Box */
        .math-output {
            background: rgba(9, 11, 16, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.6;
            color: #a7f3d0;
            overflow-x: auto;
            max-height: 150px;
        }

        /* Canvas Wrapper & Display Area */
        main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2030 0%, #0d0f13 100%);
        }

        #viewportCanvas {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(10, 11, 14, 0.9);
            max-width: 90%;
            max-height: 85%;
        }

        .canvas-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            gap: 12px;
        }

        .canvas-overlay span strong {
            color: var(--accent-color);
        }

        /* Footer styling */
        footer {
            margin-top: auto;
            padding-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px solid var(--panel-border);
            font-family: var(--font-mono);
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <aside>
        <header>
            <h1>3D Pipeline</h1>
            <div class="subtitle">Asset Troubleshooter v1.0</div>
        </header>

        <!-- Section: Asset Type -->
        <div class="control-group">
            <label for="assetSelector">Select Asset</label>
            <select id="assetSelector">
                <option value="tree" selected>Tree Canopy (drawTree)</option>
                <option value="barrel">Explosive Barrel (drawBarrel)</option>
                <option value="fire_barrel">On-Fire Barrel (drawFireBarrel)</option>
                <option value="crate">Wooden Crate (drawCrate)</option>
                <option value="lampPost">Lamp Post (drawLampPost)</option>
                <option value="primitives">Primitives Playground</option>
            </select>
        </div>

        <!-- Section: Viewer Coordinates -->
        <div class="section-title">Viewer (Player) Pos</div>

        <div class="control-group">
            <label for="viewerDist">Distance <span id="val_viewerDist" class="val">180px</span></label>
            <input type="range" id="viewerDist" min="0" max="600" value="180">
        </div>

        <div class="control-group">
            <label for="viewerAngle">Angle <span id="val_viewerAngle" class="val">45°</span></label>
            <input type="range" id="viewerAngle" min="0" max="360" value="45">
        </div>

        <div class="control-group">
            <label class="switch-container">
                <span>Auto Orbit Player</span>
                <span class="switch">
                    <input type="checkbox" id="autoOrbit">
                    <span class="slider"></span>
                </span>
            </label>
        </div>

        <!-- Section: Projection parameters -->
        <div class="section-title">Camera & Projection</div>

        <div class="control-group">
            <label for="cameraHeight">Camera Height <span id="val_cameraHeight" class="val">160</span></label>
            <input type="range" id="cameraHeight" min="80" max="500" value="160">
        </div>

        <div class="control-group">
            <label for="assetFacing">Asset Facing <span id="val_assetFacing" class="val">0°</span></label>
            <input type="range" id="assetFacing" min="0" max="360" value="0">
        </div>

        <!-- Section: Interactive Sliders based on selected asset -->
        <div id="dynamicParamsHeader" class="section-title">Asset Modifiers</div>
        <div id="dynamicParamsContainer">
            <!-- Dynamic parameters injected by Javascript -->
        </div>

        <!-- Section: Live Math Display -->
        <div class="section-title">Live Projection Matrix</div>
        <div class="control-group">
            <pre id="mathOutput" class="math-output">cx: 0.00
cy: 0.00
dx: 0.00
dy: 0.00
dist: 0.00
alpha: 0.000
topX: 0.00
topY: 0.00
viewAngle: 0.00</pre>
        </div>
    </aside>

    <main>
        <div class="canvas-overlay">
            <span>Grid spacing: <strong>40px</strong></span>
            <span>Zoom: <strong>100%</strong></span>
            <span>Render: <strong>HTML5 Canvas 2D</strong></span>
        </div>
        <canvas id="viewportCanvas" width="800" height="600"></canvas>
    </main>

    <!-- Load interactive troubleshooter logic as module -->
    <script type="module" src="./viewer.js"></script>
</body>

</html>
