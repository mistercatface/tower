<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower — Tile Lab</title>
    <style>
        :root {
            --bg: #0e1116;
            --panel: #161b24;
            --border: #2a3344;
            --text: #c8d0dc;
            --muted: #7a8799;
            --accent: #00bcd4;
            --accent-dim: #007a8c;
            --editor-w: 300px;
            --inspect-w: 280px;
            --toolbar-h: 44px;
            --status-h: 28px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            font-size: 12px;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .toolbar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px 14px;
            padding: 0 12px;
            height: var(--toolbar-h);
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            min-height: var(--toolbar-h);
        }

        .toolbar h1 {
            margin: 0;
            font-size: 14px;
            color: var(--accent);
            white-space: nowrap;
        }

        .toolbar a {
            color: var(--accent);
            text-decoration: none;
            margin-left: auto;
            white-space: nowrap;
        }

        .toolbar label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
        }

        .toolbar input[type="number"],
        .toolbar select {
            width: 4.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .toolbar input[readonly] {
            opacity: 0.85;
            cursor: default;
        }

        .toolbar .range-meta {
            color: var(--muted);
            font-size: 11px;
            padding: 4px 6px;
            border-radius: 3px;
            font: inherit;
        }

        .toolbar select {
            width: auto;
            min-width: 5rem;
            max-width: 10rem;
        }

        .toolbar input[type="range"] {
            width: 72px;
            vertical-align: middle;
        }

        .toolbar button {
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: #e8f8fb;
            padding: 4px 10px;
            border-radius: 3px;
            font: inherit;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
        }

        .toolbar button.secondary {
            background: transparent;
            border-color: var(--border);
            color: var(--text);
        }

        .toolbar .sep {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        .workspace {
            flex: 1 1 0;
            min-height: 0;
            display: grid;
            grid-template-columns: var(--editor-w) minmax(0, 1fr) var(--inspect-w);
        }

        .col {
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
            border-right: 1px solid var(--border);
            background: var(--panel);
        }

        .col:last-child {
            border-right: none;
        }

        .col-head {
            flex: 0 0 auto;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
        }

        .col-body {
            flex: 1 1 0;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* —— Editor column —— */
        .editor-tools {
            flex: 0 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }

        .editor-tools select {
            flex: 1 1 100%;
            min-width: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 6px;
            font: inherit;
        }

        .editor-scroll {
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            padding: 8px;
        }

        .editor-block {
            margin-bottom: 10px;
        }

        .editor-block h3 {
            margin: 0 0 6px;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
        }

        #motifList {
            max-height: 140px;
            overflow-y: auto;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .motif-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 6px;
            font-size: 11px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .motif-row:last-child {
            border-bottom: none;
        }

        .motif-row:hover,
        .motif-row.selected {
            background: #1e2634;
        }

        .motif-row .motif-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .motif-row .motif-layer {
            color: var(--muted);
            font-size: 9px;
        }

        .motif-row .motif-actions button {
            padding: 1px 5px;
            font-size: 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
        }

        .param-field {
            display: grid;
            grid-template-columns: 72px 1fr 32px;
            gap: 4px;
            align-items: center;
            margin-bottom: 6px;
            font-size: 11px;
            color: var(--text);
        }

        .param-field span:first-child {
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .param-field input[type="range"] {
            width: 100%;
            padding: 0;
        }

        .param-value {
            color: var(--accent);
            text-align: right;
            font-size: 10px;
        }

        #profileExport {
            width: 100%;
            height: 72px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font: inherit;
            font-size: 10px;
            padding: 6px;
            border-radius: 4px;
            resize: none;
        }

        /* —— Map column —— */
        .col-map {
            background: var(--bg);
        }

        .map-status {
            flex: 0 0 var(--status-h);
            padding: 0 10px;
            display: flex;
            align-items: center;
            font-size: 10px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .map-stage {
            flex: 1 1 0;
            min-height: 0;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            background: #080a0e;
            overflow: hidden;
        }

        #gamePreview {
            display: block;
            flex: 1 1 0;
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100%;
        }

        /* —— Inspect column —— */
        .tab-bar {
            flex: 0 0 auto;
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-bar button {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            font: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .tab-bar button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-panel {
            display: none;
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            padding: 8px;
        }

        .tab-panel.active {
            display: block;
        }

        .micro-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .micro-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .micro-card .label {
            padding: 4px 6px;
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .micro-view {
            height: 120px;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            background: repeating-conic-gradient(#1a2030 0% 25%, #141a24 0% 50%) 50% / 12px 12px;
            padding: 4px;
        }

        .micro-view canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
        }

        .repeat-view {
            height: 200px;
            overflow: auto;
            background: repeating-conic-gradient(#1a2030 0% 25%, #141a24 0% 50%) 50% / 12px 12px;
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .repeat-view canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        label.check-inline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        label.check-inline input {
            width: auto;
            margin: 0;
        }

        @media (max-width: 1100px) {
            :root {
                --editor-w: 260px;
                --inspect-w: 240px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="toolbar">
            <h1>Tile Lab</h1>
            <span class="sep"></span>
            <label>Tex seed <input id="seedInput" type="number" value="42" step="1"></label>
            <button type="button" id="randomSeedBtn" class="secondary">Rand</button>
            <span class="sep"></span>
            <label>Map <input id="mapSeedInput" type="number" value="42"></label>
            <button type="button" id="regenMapBtn" class="secondary">New map</button>
            <label>Node <select id="mapNodeSelect"></select></label>
            <span class="sep"></span>
            <label>W <input id="worldXInput" type="number" value="0" step="16"></label>
            <label>H <input id="worldYInput" type="number" value="0" step="16"></label>
            <label title="Config.gridSettings.cellSize">Cell
                <input id="cellSizeInput" type="number" readonly tabindex="-1">
            </label>
            <span class="sep"></span>
            <label>Tile <span id="zoomValue">6</span>×<input id="zoomInput" type="range" min="2" max="16" value="6" step="1"></label>
            <label title="Combat zoom (Viewport formula)">Cam <span id="gameZoomValue">1</span>×
                <input id="gameZoomInput" type="range" min="0.25" max="2.5" value="1" step="0.05">
            </label>
            <span id="rangeMeta" class="range-meta"></span>
            <span class="sep"></span>
            <label>Story <input id="storyRowInput" type="number" value="0" min="0" max="31"></label>
            <label title="Config.floorTileSettings.wallTextureStories">Stories
                <input id="storyCountInput" type="number" readonly tabindex="-1">
            </label>
            <label class="check-inline"><input id="showRangeRingInput" type="checkbox" checked> Range ring</label>
            <button type="button" id="regenerateBtn">Redraw</button>
            <a href="Index.html">Game</a>
        </div>

        <div class="workspace">
            <aside class="col col-editor">
                <div class="col-head">Profile editor</div>
                <div class="col-body">
                    <div class="editor-tools">
                        <select id="presetSelect"></select>
                        <button type="button" id="loadPresetBtn">Load</button>
                        <select id="addMotifType"></select>
                        <button type="button" id="addMotifBtn" class="secondary">+ Motif</button>
                        <button type="button" id="copyExportBtn">Copy export</button>
                    </div>
                    <div class="editor-scroll">
                        <div class="editor-block">
                            <h3>Motifs</h3>
                            <div id="motifList"></div>
                        </div>
                        <div class="editor-block">
                            <h3>Selected</h3>
                            <div id="motifParamsPanel"></div>
                        </div>
                        <div class="editor-block">
                            <h3>Global</h3>
                            <div id="globalParamsPanel"></div>
                        </div>
                        <div class="editor-block">
                            <h3>Export</h3>
                            <textarea id="profileExport" readonly></textarea>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="col col-map">
                <div class="map-status" id="gameMetaLine">WASD move · drag · wheel zoom</div>
                <div class="map-stage" id="mapStage">
                    <canvas id="gamePreview"></canvas>
                </div>
            </section>

            <aside class="col col-inspect">
                <div class="col-head">Tile inspect</div>
                <div class="col-body">
                    <div class="tab-bar">
                        <button type="button" class="tab-btn active" data-tab="cells">Cells</button>
                        <button type="button" class="tab-btn" data-tab="repeat">5×5</button>
                        <button type="button" class="tab-btn" data-tab="export">Export</button>
                    </div>
                    <div class="tab-panel active" id="tab-cells">
                        <div class="micro-grid">
                            <div class="micro-card">
                                <div class="label">Floor</div>
                                <div class="micro-view"><canvas id="floorPreview"></canvas></div>
                            </div>
                            <div class="micro-card">
                                <div class="label">Wall cell</div>
                                <div class="micro-view"><canvas id="wallCellPreview"></canvas></div>
                            </div>
                            <div class="micro-card">
                                <div class="label">Wall column</div>
                                <div class="micro-view"><canvas id="wallColumnPreview"></canvas></div>
                            </div>
                            <div class="micro-card">
                                <div class="label">Wall face</div>
                                <div class="micro-view"><canvas id="wallFacePreview"></canvas></div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-panel" id="tab-repeat">
                        <p style="margin:0 0 6px;color:var(--muted);font-size:10px">Seam check — world X/Y shifts grid</p>
                        <div class="label" style="font-size:9px;color:var(--muted);margin-bottom:4px">Floor</div>
                        <div class="repeat-view" style="margin-bottom:8px"><canvas id="floorRepeat"></canvas></div>
                        <div class="label" style="font-size:9px;color:var(--muted);margin-bottom:4px">Wall</div>
                        <div class="repeat-view"><canvas id="wallRepeat"></canvas></div>
                    </div>
                    <div class="tab-panel" id="tab-export">
                        <label style="display:block;margin-bottom:8px;color:var(--muted);font-size:11px">
                            Bake
                            <select id="exportTarget" style="width:100%;margin-top:4px;padding:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);font:inherit">
                                <option value="floor">Floor cell</option>
                                <option value="wallCell">Wall cell</option>
                                <option value="wallColumn">Wall column</option>
                                <option value="wallFace">Wall face</option>
                            </select>
                        </label>
                        <button type="button" id="exportBtn" style="width:100%">Download PNG</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script type="module" src="tile-lab.js"></script>
</body>

</html>
